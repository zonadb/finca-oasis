    <style>
        :root { --primary: #1a2a1d; --accent: #c5a880; --bg: #fdfaf5; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: #333; padding-bottom: 90px; }
        
        .app-bar { position: sticky; top: 0; background: white; padding: 15px; text-align: center; z-index: 1000; border-bottom: 1px solid #eee; }
        .app-bar h1 { font-family: 'Playfair Display', serif; margin: 0; font-size: 1.2rem; color: var(--primary); letter-spacing: 2px; }

        .container { padding: 15px; }

        .info-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }

        .section-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin: 25px 0 15px; border-left: 4px solid var(--accent); padding-left: 12px; }
        
        .photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .photo-grid img, .photo-grid video { width: 100%; height: 150px; object-fit: cover; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); background: #eee; }
        /* La primera y cada cinco fotos serán más grandes */
        .photo-grid img:nth-child(5n+1), .video-item { grid-column: span 2; height: 220px; }

        .map-box { border-radius: 20px; overflow: hidden; margin-top: 15px; border: 4px solid white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .map-box iframe { width: 100%; height: 400px; border: none; display: block; }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; height: 75px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 1000; padding-bottom: 10px; }
        .nav-item { text-decoration: none; color: #bbb; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 0.7rem; font-weight: 600; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 1.3rem; }

        .btn-whatsapp { background: #25d366; color: white; padding: 18px; border-radius: 15px; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 700; margin: 20px 0; box-shadow: 0 6px 15px rgba(37, 211, 102, 0.3); }
