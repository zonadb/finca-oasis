<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VILLA OASIS REUS</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a2a1d; --accent: #c5a880; --bg: #fdfaf5; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: #333; padding-bottom: 90px; }
        .app-bar { position: sticky; top: 0; background: white; padding: 15px; text-align: center; z-index: 1000; border-bottom: 1px solid #eee; }
        .app-bar h1 { font-family: 'Playfair Display', serif; margin: 0; font-size: 1.2rem; color: var(--primary); letter-spacing: 2px; }
        .container { padding: 15px; max-width: 900px; margin: 0 auto; }
        .info-card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .badge { background: var(--accent); color: white; padding: 5px 15px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; margin-bottom: 12px; display: inline-block; }
        .section-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin: 30px 0 15px; border-left: 5px solid var(--accent); padding-left: 15px; }
        
        /* Galería Inteligente */
        .photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .photo-grid img, .photo-grid video { width: 100%; height: 220px; object-fit: cover; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); background: #eee; }
        @media (min-width: 768px) {
            .photo-grid { grid-template-columns: repeat(3, 1fr); gap: 15px; }
            .photo-grid img:nth-child(6n+1), .video-item { grid-column: span 2; height: 400px; }
        }

        .map-box { border-radius: 25px; overflow: hidden; margin-top: 15px; border: 5px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-whatsapp { background: #25d366; color: white; padding: 18px; border-radius: 18px; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 12px; font-weight: 700; margin: 25px 0; font-size: 1.1rem; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; height: 80px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 2000; padding-bottom: 10px; }
        .nav-item { text-decoration: none; color: #aaa; display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 0.75rem; font-weight: 600; }
    </style>
</head>
<body>

    <div class="app-bar"><h1>VILLA OASIS</h1></div>

    <div class="container">
        <div class="info-card">
            <span class="badge">Capacidad: 19 Personas</span>
            <h2 style="font-family:'Playfair Display'; margin:0;">Villa de Lujo Reus</h2>
            <p style="color:#666; line-height:1.6;">Piscina privada, Barbacoa y 7 dormitorios. Todo listo para tu estancia.</p>
            <a href="https://wa.me/34617635544" class="btn-whatsapp"><i class="fab fa-whatsapp"></i> RESERVAR AHORA</a>
        </div>

        <h3 class="section-title">Galería de Fotos</h3>
        <div class="photo-grid" id="auto-gallery">
            <video src="video.mp4" controls class="video-item" poster="1.jpg"></video>
        </div>

        <h3 class="section-title" id="ubicacion">Ubicación Exacta</h3>
        <div class="map-box">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3000.3546738562634!2d1.1074558!3d41.1685419!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x12a14e062f7e7f6d%3A0x6b512423c736416a!2sCam%C3%AD%20del%20Mas%20de%20Colom%C3%AD%2C%209E%2C%2043203%20Reus%2C%20Tarragona!5e0!3m2!1ses!2ses!4v1710000000000!5m2!1ses!2ses" 
            width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item"><i class="fas fa-home"></i><span>Inicio</span></a>
        <a href="#ubicacion" class="nav-item"><i class="fas fa-map-marked-alt"></i><span>Mapa</span></a>
        <a href="https://wa.me/34617635544" class="nav-item"><i class="fab fa-whatsapp"></i><span>Chat</span></a>
        <a href="tel:+34617635544" class="nav-item"><i class="fas fa-phone"></i><span>Llamar</span></a>
    </nav>

    <script>
        // SCRIPT INTELIGENTE: Busca fotos automáticamente
        const gallery = document.getElementById('auto-gallery');
        
        async function loadPhotos() {
            for (let i = 1; i <= 50; i++) { // Probamos hasta 50 fotos
                let formats = ['jpg', 'png']; // Formatos que aceptamos
                for (let ext of formats) {
                    let url = `${i}.${ext}`;
                    let exists = await checkImage(url);
                    if (exists) {
                        const img = document.createElement('img');
                        img.src = url;
                        img.loading = "lazy";
                        gallery.appendChild(img);
                        break; // Si encuentra el .jpg, no busca el .png de ese mismo número
                    }
                }
            }
        }

        function checkImage(url) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => resolve(true);
                img.onerror = () => resolve(false);
                img.src = url;
            });
        }

        loadPhotos();
    </script>
</body>
</html>
